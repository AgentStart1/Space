name: Android Release

permissions:
  contents: write

on:
  push:
    tags:
      - '*'
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Decode signing key
        run: echo "${{ secrets.SIGNING_KEY }}" | base64 -d > $HOME/signing_key.jks

      - name: Assemble APK
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            ./gradlew :app:assembleRelease
          else
            ./gradlew :app:assembleDaily
          fi
        env:
          space_sign_key: ${{ secrets.SIGNING_KEY }}
          space_sign_alias: ${{ secrets.ALIAS }}
          space_sign_store_password: ${{ secrets.STORE_PASSWORD }}
          space_sign_key_password: ${{ secrets.KEY_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: Signed app bundle
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error

  release:
    name: Release APK
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download APK from build
        uses: actions/download-artifact@v4
        with:
          name: Signed app bundle
      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ github.ref }}
          files: '**/*.apk'
